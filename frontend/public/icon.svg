<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Melodex 图标:深色圆角底 + Spotify 绿「M」,M 两腿末端收为音符符头(呼应播放页黑胶) -->
  <defs>
    <linearGradient id="mGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#42E885"/>
      <stop offset="1" stop-color="#1ED760"/>
    </linearGradient>
  </defs>
  <!-- 圆角深底(参考图的墨绿近黑) -->
  <rect x="0" y="0" width="512" height="512" rx="116" fill="#18241d"/>
  <!-- M 主体:粗圆角折线,两峰一谷 -->
  <path d="M152 372 L152 150 L256 296 L360 150 L360 372"
        fill="none" stroke="url(#mGrad)" stroke-width="46"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 两个音符符头:压在 M 两腿底部 -->
  <g fill="url(#mGrad)">
    <ellipse cx="138" cy="380" rx="42" ry="33"/>
    <ellipse cx="374" cy="380" rx="42" ry="33"/>
  </g>
</svg>
