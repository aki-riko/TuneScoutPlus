services:
  tunescout-plus:
    build:
      context: .
      dockerfile: Dockerfile
    image: tunescout-plus:latest
    container_name: tunescout-plus
    restart: unless-stopped
    ports:
      - "8329:8329"
    volumes:
      # 持久化:下载的音乐、cookie、生成的视频、settings.db 等都在 data 下
      - ./data:/home/appuser/data
    environment:
      - TZ=Asia/Shanghai
